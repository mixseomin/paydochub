name: Deploy paydochub

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  # Serialize deploys: queue, do NOT cancel. Cancelling mid `next build` corrupts .next.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script_stop: true
          script: |
            /opt/paydochub/deploy.sh
